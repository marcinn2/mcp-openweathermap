# Server secrets:
#   - OPENWEATHER_API_KEY: the server's upstream OpenWeatherMap credential (required).
#   - MCP_AUTH_TOKEN: the Bearer access token clients must present. Omit it (and
#     the optional env entry in the Deployment) to leave the endpoint open.
#
# Prefer creating these imperatively so they never land in version control:
#   kubectl -n mcp-openweathermap create secret generic mcp-openweathermap-secret \
#     --from-literal=OPENWEATHER_API_KEY=your-openweathermap-api-key \
#     --from-literal=MCP_AUTH_TOKEN=your-strong-random-access-token
apiVersion: v1
kind: Secret
metadata:
  name: mcp-openweathermap-secret
  namespace: mcp-openweathermap
type: Opaque
stringData:
  OPENWEATHER_API_KEY: "replace-with-your-openweathermap-api-key"
  MCP_AUTH_TOKEN: "replace-with-a-strong-random-access-token"
