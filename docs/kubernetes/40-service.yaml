apiVersion: v1
kind: Service
metadata:
  name: mcp-openweathermap
  namespace: mcp-openweathermap
  labels:
    app: mcp-openweathermap
spec:
  type: ClusterIP
  # Pin a client to a single pod. Harmless with one replica, and a prerequisite
  # for correctness once you scale the stateful HTTP stream transport.
  sessionAffinity: ClientIP
  selector:
    app: mcp-openweathermap
  ports:
    - name: http
      port: 80
      targetPort: http
