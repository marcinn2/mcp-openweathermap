# Docker Compose example — OpenWeatherMap MCP Server (HTTP stream transport)
#
# Run from the repository root so Compose picks up the root .env for variable
# interpolation:
#
#   cp .env.example .env          # set OPENWEATHER_API_KEY (and optionally CORS_ORIGIN)
#   docker compose -f docs/docker-compose.yml up --build
#
# The MCP endpoint is then served at http://localhost:3000/mcp
# (legacy SSE at /sse, health check at /health).

services:
  mcp-openweathermap:
    build:
      # Build context is the repository root (this file lives in docs/).
      context: ..
      dockerfile: Dockerfile
    image: mcp-openweathermap:latest
    container_name: mcp-openweathermap
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Transport: serve the Streamable HTTP endpoint.
      MCP_TRANSPORT: httpStream
      PORT: "3000"
      MCP_ENDPOINT: /mcp
      # Allowed CORS origins (comma-separated). Defaults to "*" when unset.
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # The server's upstream OpenWeatherMap credential (required).
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      # Access token clients must present as `Authorization: Bearer <token>`.
      # Comma-separated for multiple clients. Leave empty to disable token auth
      # (open endpoint) — set it for any network-exposed deployment.
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    healthcheck:
      # The image always ships Bun, so use it for a dependency-free probe
      # (curl/wget are not guaranteed to be present).
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
